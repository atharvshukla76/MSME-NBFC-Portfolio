<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="100%" height="auto">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080711"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.2"/>
      <stop offset="70%" stop-color="#F59E0B" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#EF4444"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <style>
    .grid-line { stroke: #1E293B; stroke-width: 1; }
    .chart-line {
      stroke: url(#lineGrad);
      stroke-width: 4;
      fill: none;
      stroke-dasharray: 1000;
      stroke-dashoffset: 1000;
      animation: drawLine 4s ease-out forwards infinite;
    }
    .pulse-circle {
      fill: #EF4444;
      animation: pulse 2s infinite;
    }
    .gauge-hand {
      transform-origin: 100px 140px;
      animation: swing 3s ease-in-out infinite alternate;
    }
    .fade-text {
      fill: #F1F5F9;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-weight: 800;
      font-size: 24px;
      letter-spacing: 1px;
      opacity: 0;
      animation: fadeIn 2s forwards 0.5s;
    }
    .subtitle {
      fill: #94A3B8;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      opacity: 0;
      animation: fadeIn 2s forwards 1.2s;
    }
    @keyframes drawLine {
      0% { stroke-dashoffset: 1000; }
      70% { stroke-dashoffset: 0; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes pulse {
      0% { r: 4; opacity: 1; }
      100% { r: 12; opacity: 0; }
    }
    @keyframes swing {
      0% { transform: rotate(-60deg); }
      100% { transform: rotate(45deg); }
    }
    @keyframes fadeIn {
      to { opacity: 1; }
    }
  </style>
  <!-- Background -->
  <rect width="800" height="240" rx="12" fill="url(#bg)"/>
  
  <!-- Grid -->
  <line x1="300" y1="40" x2="300" y2="200" class="grid-line"/>
  <line x1="420" y1="40" x2="420" y2="200" class="grid-line"/>
  <line x1="540" y1="40" x2="540" y2="200" class="grid-line"/>
  <line x1="660" y1="40" x2="660" y2="200" class="grid-line"/>
  
  <line x1="260" y1="60" x2="740" y2="60" class="grid-line"/>
  <line x1="260" y1="110" x2="740" y2="110" class="grid-line"/>
  <line x1="260" y1="160" x2="740" y2="160" class="grid-line"/>
  
  <!-- Chart Line -->
  <path d="M 260 160 Q 340 150 420 120 T 580 110 T 680 60" class="chart-line"/>
  
  <!-- Risk Warning Pulsing Circle (at the end of the line) -->
  <circle cx="680" cy="60" r="6" fill="#EF4444" filter="url(#glow)"/>
  <circle cx="680" cy="60" r="4" class="pulse-circle"/>

  <!-- Gauge Chart -->
  <path d="M 50 140 A 50 50 0 0 1 150 140" fill="none" stroke="#1E293B" stroke-width="12" stroke-linecap="round"/>
  <path d="M 50 140 A 50 50 0 0 1 125 100" fill="none" stroke="#F59E0B" stroke-width="12" stroke-linecap="round"/>
  <path d="M 50 140 A 50 50 0 0 1 100 90" fill="none" stroke="#EF4444" stroke-width="12" stroke-linecap="round"/>
  <circle cx="100" cy="140" r="6" fill="#F1F5F9"/>
  <line x1="100" y1="140" x2="100" y2="95" stroke="#F1F5F9" stroke-width="4" stroke-linecap="round" class="gauge-hand"/>

  <!-- Titles -->
  <text x="50" y="55" class="fade-text">MSME CREDIT RISK</text>
  <text x="50" y="80" class="subtitle">Early Warning &amp; NPA Analytics Dashboard</text>
  
  <rect x="50" y="180" width="120" height="25" rx="6" fill="#1E293B" opacity="0.8"/>
  <text x="62" y="196" fill="#10B981" font-family="'Segoe UI', sans-serif" font-weight="bold" font-size="11">PORTFOLIO ACTIVE</text>
</svg>
